name: Audit des dépendances

on:
  schedule:
    - cron: "0 8 * * 1"
  push:
    paths:
      - requirements.txt
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt
