<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Réviseur RAG</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --ink: #0f172a;
            --muted: #64748b;
            --line: #e2e8f0;
            --accent: #4f46e5;
            --accent-dark: #4338ca;
            --accent-soft: #eef2ff;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: var(--bg); color: var(--ink);
            max-width: 820px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem;
            line-height: 1.55;
        }
        header { margin-bottom: 1.5rem; }
        h1 { font-size: 1.6rem; margin: 0; letter-spacing: -.02em; }
        .subtitle { color: var(--muted); font-size: .95rem; margin-top: .25rem; }
        .corpus { color: var(--muted); font-size: .82rem; margin-top: .6rem; }
        .corpus b { color: var(--ink); font-weight: 600; }

        .tabs { display: flex; gap: .4rem; margin: 1.4rem 0 1.2rem; flex-wrap: wrap; }
        .tab {
            padding: .45rem 1rem; border: 1px solid var(--line); border-radius: 999px;
            background: var(--card); cursor: pointer; font-size: .9rem; color: var(--ink);
            transition: all .15s;
        }
        .tab:hover:not(:disabled) { border-color: var(--accent); }
        .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .tab:disabled { color: #cbd5e1; cursor: not-allowed; }

        .card {
            background: var(--card); border: 1px solid var(--line); border-radius: 14px;
            padding: 1.25rem 1.4rem; box-shadow: 0 1px 2px rgba(15,23,42,.04);
            margin-bottom: 1.25rem;
        }
        .controls { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
        label.field { color: var(--muted); font-size: .85rem; }
        select, input[type=text] {
            padding: .6rem .7rem; font-size: .95rem; border: 1px solid var(--line);
            border-radius: 9px; background: #fff; color: var(--ink); font-family: inherit;
        }
        select:focus, input[type=text]:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }

        form.row { display: flex; gap: .6rem; }
        input[type=text] { flex: 1; }
        button {
            padding: .6rem 1.3rem; font-size: .95rem; font-weight: 500; border: 0;
            border-radius: 9px; background: var(--accent); color: #fff; cursor: pointer;
            transition: background .15s;
        }
        button:hover { background: var(--accent-dark); }
        button.ghost { background: #fff; color: var(--accent); border: 1px solid var(--accent); }
        button.ghost:hover { background: var(--accent-soft); }
        button:disabled { opacity: .55; cursor: progress; }

        .panel { display: none; }
        .panel.active { display: block; }

        .output { margin-top: 1.1rem; }
        .answer {
            background: var(--card); border: 1px solid var(--line); border-radius: 14px;
            padding: 1.1rem 1.4rem; box-shadow: 0 1px 2px rgba(15,23,42,.04);
        }
        .answer h2 { font-size: 1.05rem; margin: 1.1rem 0 .5rem; }
        .answer h2:first-child { margin-top: 0; }
        .answer ul { padding-left: 1.2rem; margin: .4rem 0; }
        .answer li { margin: .2rem 0; }
        .answer code { background: var(--accent-soft); padding: .05rem .35rem; border-radius: 4px; font-size: .9em; }
        .qlabel { font-weight: 600; margin-bottom: .5rem; color: var(--accent-dark); }
        .sources { margin-top: 1rem; padding-top: .75rem; border-top: 1px solid var(--line); font-size: .82rem; color: var(--muted); }
        .sources span {
            display: inline-block; background: var(--accent-soft); color: var(--accent-dark);
            border-radius: 5px; padding: .12rem .55rem; margin: .15rem .25rem .15rem 0; font-size: .8rem;
        }
        .hint { color: var(--muted); font-size: .85rem; margin-top: .5rem; }
        .spinner { color: var(--muted); font-style: italic; padding: 1rem 0; }

        .flash { border-radius: 9px; padding: .65rem .95rem; margin-bottom: 1rem; font-size: .9rem; }
        .flash.ok { background: #dcfce7; color: #166534; }
        .flash.error { background: #fee2e2; color: #991b1b; }

        .upload { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }
        .upload input[type=file] { flex: 1; font-size: .88rem; }
        .upload button { background: #475569; }
        .upload button:hover { background: #334155; }
    </style>
</head>
<body>
    <header>
        <h1>Réviseur RAG</h1>
        <div class="subtitle">Pose des questions et génère des fiches à partir de tes cours.</div>
        <div class="corpus">Corpus : <b id="corpus">{{ documents | join(", ") if documents else "aucun document" }}</b></div>
    </header>

    <div class="tabs">
        <button class="tab active" data-mode="qa">Q&amp;A</button>
        <button class="tab" data-mode="fiche">Fiche</button>
        <button class="tab" data-mode="quiz" disabled title="Bientôt">QCM</button>
        <button class="tab" data-mode="recall" disabled title="Bientôt">Interroge-moi</button>
        <button class="tab" data-mode="flashcards" disabled title="Bientôt">Flashcards</button>
    </div>

    <div id="flash"></div>

    <div class="card">
        <div class="controls">
            <label class="field" for="document">Document :</label>
            <select id="document">
                <option value="">Tout le corpus</option>
                {% for doc in documents %}<option value="{{ doc }}">{{ doc }}</option>{% endfor %}
            </select>
        </div>

        <div class="panel active" id="panel-qa">
            <form class="row" id="ask-form">
                <input type="text" id="question" placeholder="Posez votre question..." autofocus autocomplete="off">
                <button type="submit">Envoyer</button>
            </form>
        </div>

        <div class="panel" id="panel-fiche">
            <button id="fiche-btn">Générer la fiche de révision</button>
            <div class="hint">Synthétise le document sélectionné (ou tout le corpus) en idées clés, définitions et questions d'auto-test.</div>
        </div>
    </div>

    <div class="output" id="result"></div>

    <div class="card">
        <form class="upload" id="upload-form" enctype="multipart/form-data">
            <input type="file" id="pdf" name="pdf" accept="application/pdf">
            <button type="submit">Ajouter un PDF</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const $ = (id) => document.getElementById(id);
        const md = (text) => (window.marked ? marked.parse(text) : text);

        const flash = (msg, isError) => {
            $("flash").innerHTML = `<div class="flash ${isError ? "error" : "ok"}">${msg}</div>`;
        };
        const spin = (msg) => { $("result").innerHTML = `<div class="spinner">${msg}</div>`; };

        const refreshDocuments = (documents) => {
            $("corpus").textContent = documents.length ? documents.join(", ") : "aucun document";
            const select = $("document");
            const current = select.value;
            select.innerHTML = '<option value="">Tout le corpus</option>' +
                documents.map(d => `<option value="${d}">${d}</option>`).join("");
            select.value = current;
        };

        document.querySelectorAll(".tab").forEach(tab => {
            tab.addEventListener("click", () => {
                if (tab.disabled) return;
                document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
                document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
                tab.classList.add("active");
                $("panel-" + tab.dataset.mode).classList.add("active");
                $("result").innerHTML = "";
            });
        });

        $("ask-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const question = $("question").value.trim();
            if (!question) return;
            spin("Recherche en cours…");
            try {
                const res = await fetch("/api/ask", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({question, document: $("document").value})
                });
                const data = await res.json();
                if (!res.ok) { $("result").innerHTML = ""; flash(data.error, true); return; }
                const sources = data.sources.map(s => `<span>${s}</span>`).join("");
                $("result").innerHTML =
                    `<div class="answer"><div class="qlabel">${question}</div>${md(data.answer)}` +
                    (sources ? `<div class="sources"><strong>Sources :</strong><br>${sources}</div>` : "") +
                    `</div>`;
            } catch (err) { $("result").innerHTML = ""; flash("Erreur réseau.", true); }
        });

        $("fiche-btn").addEventListener("click", async () => {
            const btn = $("fiche-btn");
            btn.disabled = true;
            spin("Génération de la fiche…");
            try {
                const res = await fetch("/api/fiche", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({document: $("document").value})
                });
                const data = await res.json();
                if (!res.ok) { $("result").innerHTML = ""; flash(data.error, true); return; }
                $("result").innerHTML =
                    `<div class="answer"><div class="qlabel">Fiche — ${data.scope}</div>${md(data.fiche)}</div>`;
            } catch (err) { $("result").innerHTML = ""; flash("Erreur réseau.", true); }
            finally { btn.disabled = false; }
        });

        $("upload-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const fileInput = $("pdf");
            if (!fileInput.files.length) { flash("Aucun fichier sélectionné.", true); return; }
            const body = new FormData();
            body.append("pdf", fileInput.files[0]);
            flash("Indexation en cours…", false);
            try {
                const res = await fetch("/api/upload", {method: "POST", body});
                const data = await res.json();
                if (!res.ok) { flash(data.error, true); return; }
                refreshDocuments(data.documents);
                fileInput.value = "";
                flash(data.message, false);
            } catch (err) { flash("Erreur réseau.", true); }
        });
    </script>
</body>
</html>
